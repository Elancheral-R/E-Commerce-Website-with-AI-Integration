databases:
  - name: nexmart-postgres
    databaseName: nexmart_dev
    user: postgres
    plan: free

services:
  # Auth Service (Public-facing Web Service)
  - type: web
    name: auth-service
    plan: free
    runtime: docker
    dockerContext: backend
    dockerfilePath: auth-service/Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: docker
      - key: EUREKA_CLIENT_ENABLED
        value: "false"
      - key: DB_HOST
        fromDatabase:
          name: nexmart-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: nexmart-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: nexmart-postgres
          property: databaseName
      - key: DB_USER
        fromDatabase:
          name: nexmart-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: nexmart-postgres
          property: password
      - key: DB_URL
        value: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}

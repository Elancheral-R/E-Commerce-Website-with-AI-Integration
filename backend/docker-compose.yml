version: '3.8'

services:
  # Database Storage (Supabase PostgreSQL Local)
  postgres:
    image: postgres:15-alpine
    container_name: nexmart-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nexmart_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: nexmart_auth,nexmart_product,nexmart_inventory,nexmart_order
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh

  # Redis Cache Storage
  redis:
    image: redis:7-alpine
    container_name: nexmart-redis
    ports:
      - "6379:6379"

  # Zookeeper (for Kafka coordination)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: nexmart-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # Apache Kafka Messaging Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nexmart-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

volumes:
  pgdata:

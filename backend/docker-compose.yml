version: '3.8'

services:
  # Database Storage (Supabase PostgreSQL Local)
  postgres:
    image: postgres:15-alpine
    container_name: nexmart-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nexmart_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: nexmart_auth,nexmart_product,nexmart_inventory,nexmart_order
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh

  # Redis Cache Storage
  redis:
    image: redis:7-alpine
    container_name: nexmart-redis
    ports:
      - "6379:6379"

  # Zookeeper (for Kafka coordination)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: nexmart-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # Apache Kafka Messaging Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nexmart-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  # Discovery Service (Eureka)
  discovery-service:
    build: ./discovery-service
    container_name: nexmart-discovery
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  # API Gateway
  gateway-service:
    build: ./gateway-service
    container_name: nexmart-gateway
    ports:
      - "8080:8080"
    depends_on:
      - discovery-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/

  # Auth Service
  auth-service:
    build: ./auth-service
    container_name: nexmart-auth
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - discovery-service
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/nexmart_auth
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/

  # Product Catalog Service
  product-service:
    build: ./product-service
    container_name: nexmart-product
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - redis
      - discovery-service
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/nexmart_product
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SPRING_DATA_REDIS_HOST=redis
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/

  # Inventory Service
  inventory-service:
    build: ./inventory-service
    container_name: nexmart-inventory
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - discovery-service
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/nexmart_inventory
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/

  # Order Processing Service
  order-service:
    build: ./order-service
    container_name: nexmart-order
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - kafka
      - discovery-service
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/nexmart_order
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/

  # AI Assistant & Dynamic Pricing Service
  ai-service:
    build: ./ai-service
    container_name: nexmart-ai
    ports:
      - "8085:8085"
    depends_on:
      - discovery-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/

  # Notification Dispatcher Service
  notification-service:
    build: ./notification-service
    container_name: nexmart-notification
    ports:
      - "8086:8086"
    depends_on:
      - kafka
      - discovery-service
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/

  # Business Analytics Service
  analytics-service:
    build: ./analytics-service
    container_name: nexmart-analytics
    ports:
      - "8087:8087"
    depends_on:
      - kafka
      - discovery-service
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/

volumes:
  pgdata:
